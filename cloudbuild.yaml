# ── Aventra Real Estate — Cloud Build / Cloud Run ───────────────────────────
# Service: aventra-saas  |  Silo: isolated, no cross-service dependencies
# Trigger: push to main branch of aventra-saas repo

substitutions:
  _SERVICE_NAME: aventra-saas
  _REGION: us-central1
  _PROJECT_ID: tomorrow-now-ai
  _IMAGE: gcr.io/${_PROJECT_ID}/aventra-saas

steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=$$NEXT_PUBLIC_SUPABASE_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=$$NEXT_PUBLIC_SUPABASE_ANON_KEY'
      - '-t'
      - '$_IMAGE:$SHORT_SHA'
      - '-t'
      - '$_IMAGE:latest'
      - '.'
    secretEnv:
      - 'NEXT_PUBLIC_SUPABASE_URL'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY'

  # 2. Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE:latest']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_IMAGE:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-secrets=NEXT_PUBLIC_SUPABASE_URL=AVENTRA_SUPABASE_URL:latest,NEXT_PUBLIC_SUPABASE_ANON_KEY=AVENTRA_SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=AVENTRA_SUPABASE_SERVICE_ROLE_KEY:latest,RESEND_API_KEY=AVENTRA_RESEND_API_KEY:latest,NOTIFY_EMAIL=AVENTRA_NOTIFY_EMAIL:latest,STRIPE_SECRET_KEY=AVENTRA_STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=AVENTRA_STRIPE_WEBHOOK_SECRET:latest,TWILIO_ACCOUNT_SID=AVENTRA_TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=AVENTRA_TWILIO_AUTH_TOKEN:latest,UPSTASH_REDIS_REST_URL=AVENTRA_UPSTASH_REDIS_REST_URL:latest,UPSTASH_REDIS_REST_TOKEN=AVENTRA_UPSTASH_REDIS_REST_TOKEN:latest,ANTHROPIC_API_KEY=AVENTRA_ANTHROPIC_API_KEY:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/AVENTRA_SUPABASE_URL/versions/latest
      env: 'NEXT_PUBLIC_SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/AVENTRA_SUPABASE_ANON_KEY/versions/latest
      env: 'NEXT_PUBLIC_SUPABASE_ANON_KEY'
    - versionName: projects/$PROJECT_ID/secrets/AVENTRA_SUPABASE_SERVICE_ROLE_KEY/versions/latest
      env: 'SUPABASE_SERVICE_ROLE_KEY'
    - versionName: projects/$PROJECT_ID/secrets/AVENTRA_RESEND_API_KEY/versions/latest
      env: 'RESEND_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/AVENTRA_NOTIFY_EMAIL/versions/latest
      env: 'NOTIFY_EMAIL'
    - versionName: projects/$PROJECT_ID/secrets/AVENTRA_STRIPE_SECRET_KEY/versions/latest
      env: 'STRIPE_SECRET_KEY'
    - versionName: projects/$PROJECT_ID/secrets/AVENTRA_STRIPE_WEBHOOK_SECRET/versions/latest
      env: 'STRIPE_WEBHOOK_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/AVENTRA_TWILIO_ACCOUNT_SID/versions/latest
      env: 'TWILIO_ACCOUNT_SID'
    - versionName: projects/$PROJECT_ID/secrets/AVENTRA_TWILIO_AUTH_TOKEN/versions/latest
      env: 'TWILIO_AUTH_TOKEN'
    - versionName: projects/$PROJECT_ID/secrets/AVENTRA_UPSTASH_REDIS_REST_URL/versions/latest
      env: 'UPSTASH_REDIS_REST_URL'
    - versionName: projects/$PROJECT_ID/secrets/AVENTRA_UPSTASH_REDIS_REST_TOKEN/versions/latest
      env: 'UPSTASH_REDIS_REST_TOKEN'
    - versionName: projects/$PROJECT_ID/secrets/AVENTRA_ANTHROPIC_API_KEY/versions/latest
      env: 'ANTHROPIC_API_KEY'


images:
  - '$_IMAGE:$SHORT_SHA'
  - '$_IMAGE:latest'

options:
  logging: CLOUD_LOGGING_ONLY
